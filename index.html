<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Cấu Trúc Có Chú Thích</title>
</head>
<body>

  <header>
    <h1>Học Cấu Trúc HTML</h1>
  </header>

  <main>
    <h3>Danh sách bài học</h3>
    <ul>
      <li>Thẻ HTML cơ bản</li>
      <li>Bình luận trong code</li>
    </ul>

    <h3>Bảng tiến độ</h3>
    <table border="1">
      <tr>
        <th>Bài học</th>
        <th>Trạng thái</th>
      </tr>
      <tr>
        <td>Bài 1</td>
        <td>Xong</td>
      </tr>
    </table>

    <br>
    <button id="btnClick">Bấm thử</button>
  </main>

  <script>
    document.getElementById('btnClick').onclick = function() {
      alert('Thành công!');
    };
  </script>

</body>
</html>
